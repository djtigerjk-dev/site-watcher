name: Site Watcher — 기업 홈페이지 모니터링

on:
  schedule:
    # 매 10분마다 실행 (GitHub Actions 최소 단위: 5분)
    # 변경하려면: "*/5 * * * *" = 5분, "*/30 * * * *" = 30분, "0 * * * *" = 1시간
    - cron: "*/30 * * * *"

  # 수동 실행 버튼 (테스트용)
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 체크아웃
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      # 2. 이전 스냅샷 불러오기 (캐시)
      - name: 스냅샷 캐시 복원
        uses: actions/cache@v4
        with:
          path: snapshots.json
          key: snapshots-${{ github.run_id }}
          restore-keys: |
            snapshots-

      # 3. Python 세팅
      - name: Python 환경 세팅
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 4. 의존성 설치
      - name: 패키지 설치
        run: pip install requests beautifulsoup4

      # 5. 모니터링 실행
      - name: 사이트 모니터링 실행
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py

      # 6. 스냅샷 저장 (다음 실행에서 비교용)
      - name: 스냅샷 저장
        uses: actions/cache/save@v4
        if: always()
        with:
          path: snapshots.json
          key: snapshots-${{ github.run_id }}
